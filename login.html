<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login — NTAS98</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080d;
  --gold: #C9A84C;
  --gold-dim: rgba(201,168,76,0.25);
  --gold-glow: rgba(201,168,76,0.08);
  --white: #f0eee8;
  --muted: rgba(240,238,232,0.5);
  --border: rgba(201,168,76,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Cormorant Garamond', serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
}
nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  display: flex; align-items:center; justify-content:space-between;
  padding: 16px 40px;
  background: rgba(6,8,13,0.96);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 16px; font-weight: 700;
  color: var(--gold); text-decoration:none;
  letter-spacing: 4px;
}
nav ul { list-style:none; display:flex; gap:28px; }
nav ul li a {
  color: var(--white); text-decoration:none;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  opacity: 0.6; transition: all 0.3s;
}
nav ul li a:hover, nav ul li a.active { opacity:1; color: var(--gold); }
nav ul li a.login-nav-link {
  color: var(--gold);
  border: 1px solid var(--gold-dim);
  padding: 5px 14px;
}

.wrap {
  flex:1;
  display: flex; align-items: center; justify-content: center;
  padding: 110px 20px 40px;
}
.card {
  width: 100%; max-width: 460px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  padding: 40px 36px;
}
.eyebrow { font-size: 10px; letter-spacing: 5px; text-transform:uppercase; color: var(--gold); opacity:0.75; margin-bottom: 8px; text-align: center; }
.title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 28px; color: var(--white);
  text-align: center; letter-spacing: 2px;
  margin-bottom: 30px;
}
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.tab {
  flex: 1; padding: 12px;
  text-align: center; cursor: pointer;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); transition: all 0.3s;
  border-bottom: 2px solid transparent;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.field { margin-bottom: 16px; }
.field label {
  display:block; font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color: var(--gold); margin-bottom:6px; opacity:0.8;
}
.field input {
  width:100%; padding:12px 14px;
  background: rgba(240,238,232,0.03);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; outline:none;
}
.field input:focus { border-color: rgba(201,168,76,0.5); }
.btn {
  width: 100%; padding: 14px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: 'Cinzel Decorative', serif;
  font-size: 11px; letter-spacing: 4px; text-transform:uppercase;
  cursor: pointer; transition: all 0.3s;
  margin-top: 10px;
}
.btn:hover { background: var(--gold-glow); }
.btn:disabled { opacity:0.4; cursor:not-allowed; }
.msg {
  display: none; padding: 12px 14px; margin-bottom: 16px;
  font-size: 14px; line-height: 1.5;
}
.msg.show { display: block; }
.msg.error { border: 1px solid rgba(255,80,80,0.3); background: rgba(255,80,80,0.04); color: #ff9090; }
.msg.success { border: 1px solid rgba(76,201,168,0.3); background: rgba(76,201,168,0.04); color: #9affd0; }
.form { display: none; }
.form.show { display: block; }
.help { font-size: 13px; color: var(--muted); text-align: center; margin-top: 16px; font-style: italic; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">NTAS98</a>
  <ul>
    <li><a href="courses.html">Ancestral Studies</a></li>
    <li><a href="portal.html">The Root Portal</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="booking.html">Booking</a></li>
    <li><a href="login.html" class="active login-nav-link">Member Login</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="card">
    <div class="eyebrow">Members Only</div>
    <div class="title">Welcome Back</div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <div class="msg" id="msg"></div>

    <!-- LOGIN -->
    <div class="form show" id="form-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="li-email" placeholder="your@email.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="li-password" placeholder="Your password"/>
      </div>
      <button class="btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div class="form" id="form-register">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="Your name"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="your@email.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="r-password" placeholder="Create a password"/>
      </div>
      <div class="field">
        <label>Access Code</label>
        <input type="text" id="r-code" placeholder="Your access code" style="text-transform:uppercase;"/>
      </div>
      <button class="btn" onclick="doRegister()">Create Account</button>
      <div class="help">Need an access code? Visit <a href="portal.html" style="color:var(--gold)">The Root Portal</a> to subscribe.</div>
    </div>
  </div>
</div>

<script>
function switchTab(which) {
  document.getElementById('tab-login').classList.toggle('active', which === 'login');
  document.getElementById('tab-register').classList.toggle('active', which === 'register');
  document.getElementById('form-login').classList.toggle('show', which === 'login');
  document.getElementById('form-register').classList.toggle('show', which === 'register');
  hideMsg();
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg show ' + type;
}
function hideMsg() {
  document.getElementById('msg').className = 'msg';
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const password = document.getElementById('li-password').value;
  if (!email || !password) { showMsg('Enter your email and password.', 'error'); return; }

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    const res = await fetch('/.netlify/functions/auth-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Login failed');

    localStorage.setItem('ntas98_user', data.user.email);
    localStorage.setItem('ntas98_userdata_' + data.user.email, JSON.stringify(data.user));

    showMsg('Signed in. Redirecting...', 'success');
    setTimeout(() => {
      if (data.user.portal_tier) window.location.href = 'portal-member.html';
      else if (data.user.courses && data.user.courses.length) window.location.href = 'courses-portal.html';
      else window.location.href = 'index.html';
    }, 600);
  } catch(e) {
    showMsg(e.message || 'Login failed. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-password').value;
  const accessCode = document.getElementById('r-code').value.trim().toUpperCase();
  if (!name || !email || !password || !accessCode) { showMsg('All fields are required.', 'error'); return; }

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Creating account...';

  try {
    const res = await fetch('/.netlify/functions/auth-register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, accessCode })
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Registration failed');

    localStorage.setItem('ntas98_user', data.user.email);
    localStorage.setItem('ntas98_userdata_' + data.user.email, JSON.stringify(data.user));

    showMsg('Account created. Redirecting...', 'success');
    setTimeout(() => {
      if (data.user.portal_tier) window.location.href = 'portal-member.html';
      else if (data.user.courses && data.user.courses.length) window.location.href = 'courses-portal.html';
      else window.location.href = 'index.html';
    }, 600);
  } catch(e) {
    showMsg(e.message || 'Registration failed.', 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

// If already logged in, redirect
const existing = localStorage.getItem('ntas98_user');
if (existing) {
  const ud = localStorage.getItem('ntas98_userdata_' + existing);
  if (ud) {
    try {
      const user = JSON.parse(ud);
      if (user.portal_tier) window.location.href = 'portal-member.html';
    } catch(e){}
  }
}
</script>
</body>
</html>
