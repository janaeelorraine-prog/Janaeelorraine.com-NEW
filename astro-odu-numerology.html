function reduceWithCompound(sum) {
  if (sum === 0) return { final: 0, compound: null, karmic: false, master: false };
  if (sum === 11 || sum === 22 || sum === 33) return { final: sum, compound: null, karmic: false, master: true };
  if (sum <= 9) return { final: sum, compound: null, karmic: false, master: false };
  const isKarmic = [13, 14, 16, 19, 26].includes(sum);
  const compound = sum;
  let n = sum;
  while (n > 9) {
    if (n === 11 || n === 22 || n === 33) return { final: n, compound: sum > n ? sum : null, karmic: isKarmic, master: true };
    n = String(n).split('').map(Number).reduce((a, b) => a + b, 0);
  }
  return { final: n, compound, karmic: isKarmic, master: false };
}

function nameValues(name) {
  const words = (name || '').toUpperCase().trim().split(/\s+/).filter(Boolean);
  const wordData = words.map(w => {
    const cleaned = w.replace(/[^A-Z]/g, '');
    return cleaned.split('').map(ch => ({ letter: ch, value: CHALDEAN_VALUES[ch] || 0, isVowel: VOWELS.has(ch) }));
  });
  const flat = wordData.flat();
  const vowelSum = flat.filter(l => l.isVowel).reduce((a, l) => a + l.value, 0);
  const consonantSum = flat.filter(l => !l.isVowel).reduce((a, l) => a + l.value, 0);
  return {
    name: words.join(' '), words: wordData,
    soulUrge: reduceWithCompound(vowelSum),
    personality: reduceWithCompound(consonantSum),
    expression: reduceWithCompound(vowelSum + consonantSum)
  };
}

function calcLifePath(year, month, day) {
  const sum = `${month}${day}${year}`.split('').map(Number).reduce((a, b) => a + b, 0);
  return reduceWithCompound(sum);
}
function calcBirthday(day) { return reduceWithCompound(day); }
function reduceSimple(n) {
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) n = String(n).split('').map(Number).reduce((a, b) => a + b, 0);
  return n;
}
function calcPersonalYear(month, day, currentYear = new Date().getFullYear()) {
  const sum = `${month}${day}${currentYear}`.split('').map(Number).reduce((a, b) => a + b, 0);
  return { ...reduceWithCompound(sum), forYear: currentYear };
}

function calcPinnaclesChallenges(year, month, day, lifePathFinal) {
  const m = reduceSimple(month), dr = reduceSimple(day), yr = reduceSimple(year);
  const p1 = reduceWithCompound(m + dr);
  const p2 = reduceWithCompound(dr + yr);
  const p3 = reduceWithCompound((p1.master ? p1.final : reduceSimple(p1.final)) + (p2.master ? p2.final : reduceSimple(p2.final)));
  const p4 = reduceWithCompound(m + yr);
  const c1 = Math.abs(m - dr), c2 = Math.abs(dr - yr), c3 = Math.abs(c1 - c2), c4 = Math.abs(m - yr);
  const lpRed = lifePathFinal > 9 ? reduceSimple(lifePathFinal) : lifePathFinal;
  const firstAge = 36 - lpRed;
  return {
    pinnacles: [
      { ...p1, ageStart: 0, ageEnd: firstAge, name: 'First Pinnacle' },
      { ...p2, ageStart: firstAge + 1, ageEnd: firstAge + 9, name: 'Second Pinnacle' },

  };
}

function calculateProfile(birthName, chosenName, birthDate) {
  const [yStr, mStr, dStr] = birthDate.split('-');
  const year = parseInt(yStr), month = parseInt(mStr), day = parseInt(dStr);
  const birthCalc = nameValues(birthName);
  const sameAsBirth = !chosenName || chosenName.trim().toUpperCase() === birthName.trim().toUpperCase();
  const chosenCalc = sameAsBirth ? null : nameValues(chosenName);
  const lifePath = calcLifePath(year, month, day);
  const birthday = calcBirthday(day);
  const personalYear = calcPersonalYear(month, day);
  const cycles = calcPinnaclesChallenges(year, month, day, lifePath.final);
  const activeNumbers = [
    lifePath.final,
    (chosenCalc || birthCalc).soulUrge.final,
    (chosenCalc || birthCalc).personality.final,
    (chosenCalc || birthCalc).expression.final,
    birthday.final
  ];
  const compounds = [];
  const collect = (calc, label) => { if (calc.compound && COMPOUND_MEANINGS[calc.compound]) compounds.push({ value: calc.compound, source: label }); };
  collect(lifePath, 'Life Path');
  collect(birthCalc.soulUrge, 'Soul Urge (birth)');
  collect(birthCalc.personality, 'Personality (birth)');
  collect(birthCalc.expression, 'Expression (birth)');
  if (chosenCalc) {
    collect(chosenCalc.soulUrge, 'Soul Urge (active)');
    collect(chosenCalc.personality, 'Personality (active)');
    collect(chosenCalc.expression, 'Expression (active)');
  }
  collect(personalYear, 'Personal Year');
  const karmics = [], masters = [];
  const noteCalc = (calc, label) => {
    if (calc.karmic) karmics.push({ value: calc.compound, source: label, info: KARMIC_NUMBERS[calc.compound] });
    if (calc.master) masters.push({ value: calc.final, source: label, info: MASTER_NUMBERS[calc.final] });
  };
  noteCalc(lifePath, 'Life Path');
  noteCalc(birthCalc.soulUrge, 'Soul Urge (birth)');
  noteCalc(birthCalc.personality, 'Personality (birth)');
  noteCalc(birthCalc.expression, 'Expression (birth)');
  if (chosenCalc) {
    noteCalc(chosenCalc.soulUrge, 'Soul Urge (active)');
    noteCalc(chosenCalc.personality, 'Personality (active)');
    noteCalc(chosenCalc.expression, 'Expression (active)');
  }
  noteCalc(birthday, 'Birthday');
  noteCalc(personalYear, `Personal Year ${personalYear.forYear}`);
  return {
    birthName: birthCalc.name,
    chosenName: chosenCalc ? chosenCalc.name : null,
    sameAsBirth,
    birthDate: { year, month, day },
    birthCalc, chosenCalc,
    lifePath, birthday, personalYear,
    cycles, compounds, karmics, masters, activeNumbers
  };
}

function NumerologicalSigil({ profile }) {
  const cx = 250, cy = 250;
  const R_OUTER = 235, R_NUMBERS = 195, R_SIGIL = 168, R_CENTER = 50;
  const numAngle = num => 270 + (num - 1) * 40;
  const polar = (r, ang) => ({ x: cx + r * Math.cos(ang * Math.PI / 180), y: cy + r * Math.sin(ang * Math.PI / 180) });
  const visualNum = n => { if (n === 11) return 2; if (n === 22) return 4; if (n === 33) return 6; if (n === 0) return 1; return n; };
  const activeSet = new Set(profile.activeNumbers.map(visualNum));
  const activeNumbers = profile.activeNumbers.map(visualNum);
  const activePoints = activeNumbers.map(n => polar(R_SIGIL, numAngle(n)));
  const activePath = activePoints.length > 0
    ? `M ${activePoints[0].x} ${activePoints[0].y} ${activePoints.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ')} Z`
    : '';

  let birthPath = '', birthSet = new Set();
  if (profile.chosenCalc) {
    const birthNumbers = [profile.lifePath.final, profile.birthCalc.soulUrge.final, profile.birthCalc.personality.final, profile.birthCalc.expression.final, profile.birthday.final].map(visualNum);
    birthSet = new Set(birthNumbers);
    const birthPoints = birthNumbers.map(n => polar(R_SIGIL, numAngle(n)));
    birthPath = `M ${birthPoints[0].x} ${birthPoints[0].y} ${birthPoints.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ')} Z`;
  }

  const ticks = [];
  for (let i = 0; i < 72; i++) {
    const ang = i * 5;
    ticks.push({ p1: polar(R_OUTER + 6, ang), p2: polar(R_OUTER + (i % 9 === 0 ? 12 : 10), ang), big: i % 9 === 0 });
  }

  return (
    <svg viewBox="0 0 500 580" className="w-full max-w-md mx-auto">
      <defs>
        <radialGradient id="numBg" cx="50%" cy="50%">
          <stop offset="0%" stopColor="#1a1612" /><stop offset="60%" stopColor="#0e0c0a" /><stop offset="100%" stopColor="#050403" />
        </radialGradient>
        <linearGradient id="numGold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#a8852a" /><stop offset="50%" stopColor="#f4d03f" /><stop offset="100%" stopColor="#a8852a" />
        </linearGradient>
        <linearGradient id="sigilFlow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#d4af37" stopOpacity="0.4" /><stop offset="50%" stopColor="#f4d03f" stopOpacity="0.95" /><stop offset="100%" stopColor="#d4af37" stopOpacity="0.4" />
        </linearGradient>
        <filter id="numGlow"><feGaussianBlur stdDeviation="1.8" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
      </defs>
      <rect width="500" height="580" fill="#050403" />
      <circle cx={cx} cy={cy} r={R_OUTER + 14} fill="url(#numBg)" />
      {ticks.map((t, i) => (<line key={`t-${i}`} x1={t.p1.x} y1={t.p1.y} x2={t.p2.x} y2={t.p2.y} stroke="#d4af37" strokeWidth={t.big ? 1 : 0.4} opacity={t.big ? 0.85 : 0.4} />))}
      <circle cx={cx} cy={cy} r={R_OUTER} fill="none" stroke="url(#numGold)" strokeWidth="2" filter="url(#numGlow)" />
      <circle cx={cx} cy={cy} r={R_OUTER + 6} fill="none" stroke="#d4af37" strokeWidth="0.4" opacity="0.5" />
      <circle cx={cx} cy={cy} r={R_SIGIL + 8} fill="none" stroke="#d4af37" strokeWidth="0.5" opacity="0.4" />
      <g opacity="0.13">
        {ORISHA_NUMBERS.map((o, i) => {
          const a1 = numAngle(o.num);
          const a2 = numAngle(((o.num + 4 - 1) % 9) + 1);
          const p1 = polar(R_SIGIL, a1), p2 = polar(R_SIGIL, a2);
          return <line key={`star-${i}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#d4af37" strokeWidth="0.4" />;
        })}
      </g>
      {birthPath && (<path d={birthPath} fill="none" stroke="#a8852a" strokeWidth="1" strokeDasharray="4 3" opacity="0.55" />)}
      {activePath && (<path d={activePath} fill="rgba(212, 175, 55, 0.06)" stroke="url(#sigilFlow)" strokeWidth="1.8" filter="url(#numGlow)" />)}
      {ORISHA_NUMBERS.map(o => {
        const ang = numAngle(o.num);
        const pos = polar(R_NUMBERS, ang);
        const isActive = activeSet.has(o.num);
        const isBirthOnly = birthSet.has(o.num) && !isActive;
        return (
          <g key={`n-${o.num}`}>
            <circle cx={pos.x} cy={pos.y} r="22" fill="#0a0908"
              stroke={isActive ? '#f4d03f' : (isBirthOnly ? '#a8852a' : '#5a4a28')}
              strokeWidth={isActive ? 2 : 0.8}
              filter={isActive ? 'url(#numGlow)' : ''} />
            <text x={pos.x} y={pos.y - 4} textAnchor="middle" dominantBaseline="middle"

  const [view, setView] = useState('form');

  const [error, setError] = useState(null);
  const [stage, setStage] = useState('');
  // URL querystring takes first crack at prefilling — lets the dashboard
  // hand off birth data without round-tripping localStorage.
  const [prefill, setPrefill] = useState(() => {
    try {
      const q = new URLSearchParams(window.location.search);
      const out = {};
      if (q.get('name')) out.full_name = q.get('name');
      if (q.get('dob'))  out.dob = q.get('dob');
      if (q.get('time')) out.birth_time = q.get('time');
      if (q.get('loc'))  out.birth_location = q.get('loc');
      return Object.keys(out).length ? out : null;
    } catch { return null; }
  });

  // Pull prefill from cache + Supabase
  useEffect(() => {
    const u = (localStorage.getItem('ntas98_user') || '').toLowerCase();
    if (!u) return;
    try {
      const raw = localStorage.getItem('ntas98_profile_' + u);
      if (raw) {
        const p = JSON.parse(raw);
        setPrefill({ full_name: p.full_name, dob: p.dob });
      } else {
        const ud = localStorage.getItem('ntas98_userdata_' + u);
        if (ud) {
          const d = JSON.parse(ud);
          if (d.full_name || d.name) setPrefill({ full_name: d.full_name || d.name });
        }
      }
    } catch(e) {}
    (async () => {
      try {
        const res = await fetch('/.netlify/functions/get-profile', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userEmail: u })
        });
        const data = await res.json();
        if (data && data.success && data.profile) {
          const p = data.profile;
          setPrefill({ full_name: p.full_name || null, dob: p.dob || null });
          try { localStorage.setItem('ntas98_profile_' + u, JSON.stringify(p)); } catch(e) {}
        }
      } catch(e) {}
    })();
  }, []);

  const orishaName = num => {
    const v = num === 11 ? 2 : num === 22 ? 4 : num === 33 ? 6 : num;
    const o = ORISHA_NUMBERS.find(o => o.num === v);
    return o ? o.orisha : '';

      setStage('');

      setError(err.message || 'The channel has been disturbed. Try again.');
      setStage('');

                        <div className="flex items-baseline gap-3 mb-1">
                          <span className="text-orange-300 font-serif text-2xl">{k.value}</span>
                          <span className="text-orange-200 font-serif">{k.info?.name}</span>
                          <span className="text-stone-400 text-xs font-serif italic">via {k.source}</span>
                        </div>
                        <div className="text-stone-300 font-serif text-sm">{k.info?.meaning}</div>
                      </div>
                    ))}
                  </div>
                )}
              </Section>
              {r4.master_channels && profile.masters.length > 0 && (
                <Section number="XI" title="Master Channels">
                  <p>{r4.master_channels}</p>
                  <div className="grid gap-3 mt-5">
                    {profile.masters.map((m, i) => (
                      <div key={i} className="bg-gradient-to-br from-amber-950/30 via-stone-900/50 to-amber-950/30 border border-amber-500/40 rounded p-4">
                        <div className="flex items-baseline gap-3 mb-1">
                          <span className="text-amber-300 font-serif text-2xl">{m.value}</span>
                          <span className="text-amber-200 font-serif">{m.info?.name}</span>
                          <span className="text-amber-400/60 text-xs font-serif italic">{m.info?.orisha}</span>
                        </div>
                        <div className="text-amber-300/40 text-[10px] font-display tracking-widest mb-2">via {m.source}</div>
                        <div className="text-stone-200 font-serif text-sm italic">{m.info?.meaning}</div>
                      </div>
                    ))}
                  </div>
                </Section>
              )}
              <Section number={r4.master_channels && profile.masters.length > 0 ? 'XII' : 'XI'} title="Sankofa — Reach Back">
                <p>{r4.sankofa}</p>
              </Section>
              <div className="text-center mt-16 mb-8 no-print">
                <div className="h-px w-24 bg-amber-400/60 mx-auto mb-6"></div>
                <button onClick={() => window.print()} className="mr-4 bg-amber-700/30 border border-amber-500/60 text-amber-200 font-display tracking-widest px-6 py-3 rounded hover:bg-amber-700/50 transition">SAVE AS PDF</button>
                <button onClick={reset} className="bg-transparent border border-amber-500/60 text-amber-200 font-display tracking-widest px-6 py-3 rounded hover:bg-amber-700/30 transition">CAST ANOTHER</button>
              </div>
              <div className="text-center text-amber-700/50 font-serif italic text-sm pb-12">⊹  NTAS98 · Nature · Trap · Soul · 1998  ⊹</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AstroOduNumerology />);
</script>
</body>
</html>
