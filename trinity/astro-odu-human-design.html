const PI = Math.PI, RAD = PI / 180, DEG = 180 / PI;
const rev = a => ((a % 360) + 360) % 360;
const sind = a => Math.sin(a * RAD);
const cosd = a => Math.cos(a * RAD);
const atan2d = (y, x) => Math.atan2(y, x) * DEG;

function julianDay(year, month, day, hour, minute, tzOffset) {
  const utHour = hour + minute / 60 - tzOffset;
  let y = year, m = month;
  if (m <= 2) { y -= 1; m += 12; }
  const a = Math.floor(y / 100);
  const b = 2 - a + Math.floor(a / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + day + b - 1524.5 + utHour / 24;
}

function solveKepler(M, e) {
  let E = M + e * DEG * sind(M) * (1 + e * cosd(M));
  for (let i = 0; i < 8; i++) {
    const dE = (E - e * DEG * sind(E) - M) / (1 - e * cosd(E));
    E -= dE;
    if (Math.abs(dE) < 0.0001) break;
  }
  return E;
}

function sunPosition(d) {
  const w = 282.9404 + 4.70935e-5 * d;
  const e = 0.016709 - 1.151e-9 * d;
  const M = rev(356.0470 + 0.9856002585 * d);
  const E = solveKepler(M, e);
  const xv = cosd(E) - e;
  const yv = Math.sqrt(1 - e * e) * sind(E);
  return { lon: rev(atan2d(yv, xv) + w), r: Math.sqrt(xv * xv + yv * yv) };
}

function moonPosition(d) {
  const N = rev(125.1228 - 0.0529538083 * d);
  const i = 5.1454, w = rev(318.0634 + 0.1643573223 * d);
  const a = 60.2666, e = 0.054900;
  const M = rev(115.3654 + 13.0649929509 * d);
  const E = solveKepler(M, e);
  const xv = a * (cosd(E) - e);
  const yv = a * Math.sqrt(1 - e * e) * sind(E);
  const v = atan2d(yv, xv);
  const xh = (cosd(N) * cosd(v + w) - sind(N) * sind(v + w) * cosd(i));
  const yh = (sind(N) * cosd(v + w) + cosd(N) * sind(v + w) * cosd(i));
  let lon = rev(atan2d(yh, xh));
  const Ms = rev(356.0470 + 0.9856002585 * d);
  const ws = 282.9404 + 4.70935e-5 * d;
  const Ls = rev(Ms + ws);
  const Lm = rev(M + w + N);
  const D = rev(Lm - Ls);
  lon += -1.274 * sind(M - 2 * D) + 0.658 * sind(2 * D) - 0.186 * sind(Ms)
    - 0.059 * sind(2 * M - 2 * D) - 0.057 * sind(M - 2 * D + Ms)
    + 0.053 * sind(M + 2 * D) + 0.046 * sind(2 * D - Ms)
    + 0.041 * sind(M - Ms) - 0.035 * sind(D) - 0.031 * sind(M + Ms);
  return rev(lon);
}

function planetPosition(planet, d) {
  if (planet === 'Pluto') {
    const P = (238.95 + 0.003968789 * d);
    return rev(238.9508 + 0.00400703 * d
      - 19.799 * sind(P) + 19.848 * cosd(P)
      + 0.897 * sind(2*P) - 4.956 * cosd(2*P)
      + 0.610 * sind(3*P) + 1.211 * cosd(3*P)
      - 0.341 * sind(4*P) - 0.190 * cosd(4*P)
      + 0.128 * sind(5*P) - 0.034 * cosd(5*P)
      - 0.038 * sind(6*P) + 0.031 * cosd(6*P));
  }
  const elements = {
    Mercury: { N: 48.3313 + 3.24587e-5 * d, i: 7.0047, w: 29.1241 + 1.01444e-5 * d, a: 0.387098, e: 0.205635, M: rev(168.6562 + 4.0923344368 * d) },
    Venus: { N: 76.6799 + 2.46590e-5 * d, i: 3.3946, w: 54.8910 + 1.38374e-5 * d, a: 0.723330, e: 0.006773, M: rev(48.0052 + 1.6021302244 * d) },
    Mars: { N: 49.5574 + 2.11081e-5 * d, i: 1.8497, w: 286.5016 + 2.92961e-5 * d, a: 1.523688, e: 0.093405, M: rev(18.6021 + 0.5240207766 * d) },
    Jupiter: { N: 100.4542 + 2.76854e-5 * d, i: 1.3030, w: 273.8777 + 1.64505e-5 * d, a: 5.20256, e: 0.048498, M: rev(19.8950 + 0.0830853001 * d) },
    Saturn: { N: 113.6634 + 2.38980e-5 * d, i: 2.4886, w: 339.3939 + 2.97661e-5 * d, a: 9.55475, e: 0.055546, M: rev(316.9670 + 0.0334442282 * d) },
    Uranus: { N: 74.0005 + 1.3978e-5 * d, i: 0.7733, w: 96.6612 + 3.0565e-5 * d, a: 19.18171, e: 0.047318, M: rev(142.5905 + 0.011725806 * d) },
    Neptune: { N: 131.7806 + 3.0173e-5 * d, i: 1.7700, w: 272.8461, a: 30.05826, e: 0.008606, M: rev(260.2471 + 0.005995147 * d) }
  };
  const el = elements[planet];
  if (!el) return 0;
  const E = solveKepler(el.M, el.e);
  const xv = el.a * (cosd(E) - el.e);
  const yv = el.a * Math.sqrt(1 - el.e * el.e) * sind(E);
  const v = atan2d(yv, xv);
  const r = Math.sqrt(xv * xv + yv * yv);
  const xh = r * (cosd(el.N) * cosd(v + el.w) - sind(el.N) * sind(v + el.w) * cosd(el.i));
  const yh = r * (sind(el.N) * cosd(v + el.w) + cosd(el.N) * sind(v + el.w) * cosd(el.i));
  const sun = sunPosition(d);
  return rev(atan2d(yh + sun.r * sind(sun.lon), xh + sun.r * cosd(sun.lon)));
}

function meanNodePosition(d) { return rev(125.0445550 - 0.05295377 * d); }

function gateAndLineFromLongitude(lon) {
  const offset = ((lon - HD_WHEEL_START) % 360 + 360) % 360;
  const wheelPos = Math.floor(offset / 5.625);
  const hdGate = HD_WHEEL_ORDER[wheelPos];
  const lineFloat = (offset % 5.625) / (5.625 / 6);
  const line = Math.min(6, Math.floor(lineFloat) + 1);
  const odIdx = Math.floor(lon / 5.625);
  const odu = ODU_ORDER[Math.floor(odIdx / 4)];
  const element = ELEMENT_ORDER[odIdx % 4];
  return { hdGate, line, astroGate: `${odu}-${element}`, odu, element, longitude: lon };
}

function computeAllActivations(jd) {
  const d = jd - 2451543.5;
  const sun = sunPosition(d);
  const moonLon = moonPosition(d);
  const earth = rev(sun.lon + 180);
  const nodeLon = meanNodePosition(d);
  const southNodeLon = rev(nodeLon + 180);
  const positions = {
    Sun: sun.lon, Earth: earth, Moon: moonLon,
    NorthNode: nodeLon, SouthNode: southNodeLon,
    Mercury: planetPosition('Mercury', d), Venus: planetPosition('Venus', d),
    Mars: planetPosition('Mars', d), Jupiter: planetPosition('Jupiter', d),
    Saturn: planetPosition('Saturn', d), Uranus: planetPosition('Uranus', d),
    Neptune: planetPosition('Neptune', d), Pluto: planetPosition('Pluto', d)
  };
  const result = {};
  for (const [name, lon] of Object.entries(positions)) result[name] = { ...gateAndLineFromLongitude(lon) };
  return result;
}

function findDesignJD(birthJD) {
  const birthD = birthJD - 2451543.5;
  const birthSunLon = sunPosition(birthD).lon;
  const targetSunLon = rev(birthSunLon - 88);
  let designJD = birthJD - 88 / 0.9856;
  for (let i = 0; i < 10; i++) {
    const d = designJD - 2451543.5;
    const sunLon = sunPosition(d).lon;
    let diff = ((targetSunLon - sunLon + 540) % 360) - 180;
    designJD += diff / 0.9856;
    if (Math.abs(diff) < 0.0005) break;
  }
  return designJD;
}

    if (!gateActivations[act.hdGate]) gateActivations[act.hdGate] = [];

    allActivations.push({ side: 'Personality', source: src, ...act });

  for (const [src, act] of Object.entries(design)) {
    activeGates.add(act.hdGate);

    gateActivations[act.hdGate].push({ side: 'Design', source: src, line: act.line, astroGate: act.astroGate });

  const definedChannels = CHANNELS.filter(c => activeGates.has(c.gates[0]) && activeGates.has(c.gates[1]));
  const partialChannels = CHANNELS.filter(c =>
    (activeGates.has(c.gates[0]) || activeGates.has(c.gates[1])) &&

  for (const ch of definedChannels) { definedCenters.add(ch.centers[0]); definedCenters.add(ch.centers[1]); }

  const sacralDefined = definedCenters.has('Sacral');
  const motors = ['Sacral', 'Heart', 'SP', 'Root'];
  function reachable(start) {
    const visited = new Set([start]);
    const queue = [start];
    while (queue.length) {
      const cur = queue.shift();
      for (const ch of definedChannels) {
        if (ch.centers.includes(cur)) {
          const other = ch.centers[0] === cur ? ch.centers[1] : ch.centers[0];
          if (!visited.has(other)) { visited.add(other); queue.push(other); }
        }
      }
    }
    return visited;
  }
  const throatReach = definedCenters.has('Throat') ? reachable('Throat') : new Set();
  const throatToMotor = motors.some(m => throatReach.has(m));

  let type;
  if (definedCenters.size === 0) type = 'Reflector';
  else if (sacralDefined && throatToMotor) type = 'Manifesting Generator';
  else if (sacralDefined) type = 'Generator';
  else if (throatToMotor) type = 'Manifestor';
  else type = 'Projector';

  let authority;
  if (type === 'Reflector') authority = 'Lunar';
  else if (definedCenters.has('SP')) authority = 'Emotional';
  else if (sacralDefined && (type === 'Generator' || type === 'Manifesting Generator')) authority = 'Sacral';
  else if (definedCenters.has('Spleen')) authority = 'Splenic';
  else if (definedCenters.has('Heart')) authority = 'Ego';
  else if (type === 'Projector' && definedCenters.has('G')) authority = 'G Self-Projected';
  else authority = 'Mental';

  const profile = `${personality.Sun.line}/${design.Sun.line}`;
  const profileNames = { 1: LINES[0].name, 2: LINES[1].name, 3: LINES[2].name, 4: LINES[3].name, 5: LINES[4].name, 6: LINES[5].name };

  function countGroups() {
    const visited = new Set();
    let groups = 0;
    for (const c of definedCenters) {
      if (visited.has(c)) continue;
      groups++;
      const queue = [c];
      while (queue.length) {
        const cur = queue.shift();
        if (visited.has(cur)) continue;
        visited.add(cur);
        for (const ch of definedChannels) {
          if (ch.centers.includes(cur)) {
            const other = ch.centers[0] === cur ? ch.centers[1] : ch.centers[0];
            if (!visited.has(other)) queue.push(other);
          }
        }
      }
    }
    return groups;
  }
  const groupCount = countGroups();
  const definitionNames = ['No Definition', 'Single Definition', 'Split Definition', 'Triple Split', 'Quadruple Split'];
  const definition = definitionNames[Math.min(groupCount, 4)];

  const incarnationCross = {
    personalitySun: personality.Sun, personalityEarth: personality.Earth,
    designSun: design.Sun, designEarth: design.Earth
  };

  return {
    activeGates, gateActivations, allActivations,
    definedChannels, partialChannels, definedCenters,
    type, authority, profile,
    profileLines: { conscious: personality.Sun.line, unconscious: design.Sun.line },
    profileNames: { conscious: profileNames[personality.Sun.line], unconscious: profileNames[design.Sun.line] },
    definition, groupCount, incarnationCross, sect: null
  };
}

function calculateChart(birthData) {
  const { year, month, day, hour, minute, tz } = birthData;
  const birthJD = julianDay(year, month, day, hour, minute, tz);
  const designJD = findDesignJD(birthJD);
  const personality = computeAllActivations(birthJD);
  const design = computeAllActivations(designJD);
  const analysis = analyzeChart(personality, design);
  const hourOfDay = hour + minute / 60;
  const sect = (hourOfDay >= 6 && hourOfDay < 18) ? 'Day' : 'Night';
  return { birthData, birthJD, designJD, personality, design, ...analysis, sect, designDate: julianDateToCalendar(designJD) };
}

function julianDateToCalendar(jd) {
  const J = jd + 0.5;
  const Z = Math.floor(J);
  const F = J - Z;
  let A = Z;
  if (Z >= 2299161) {
    const alpha = Math.floor((Z - 1867216.25) / 36524.25);
    A = Z + 1 + alpha - Math.floor(alpha / 4);
  }
  const B = A + 1524;
  const C = Math.floor((B - 122.1) / 365.25);
  const D = Math.floor(365.25 * C);
  const E = Math.floor((B - D) / 30.6001);
  const day = B - D - Math.floor(30.6001 * E) + F;
  const month = E < 14 ? E - 1 : E - 13;
  const year = month > 2 ? C - 4716 : C - 4715;
  return { year, month, day: Math.floor(day) };
}

async function callBackend(chart, part) {
  const userEmail = (window.localStorage.getItem('ntas98_user') || '').toLowerCase();
  // Serialize the chart for backend (Set/Map need conversion)
  const serializable = {
    ...chart,
    activeGates: [...chart.activeGates],
    definedCenters: [...chart.definedCenters]
  };
  const response = await fetch(API_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ userEmail, chart: serializable, part })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error || `API returned ${response.status}`);
  }
  return await response.json();
}

function CenterShape({ center, defined, partial }) {
  const fill = defined ? 'url(#hdGoldGrad)' : '#0a0908';
  const stroke = defined ? '#f4d03f' : (partial ? '#a8852a' : '#5a4a28');
  const strokeWidth = defined ? 2.2 : (partial ? 1.2 : 0.8);
  const filter = defined ? 'url(#hdGlow)' : '';
  const { cx, cy } = center;
  switch (center.shape) {
    case 'triangleDown': { const s = center.size / 2; return <polygon points={`${cx},${cy + s} ${cx - s},${cy - s} ${cx + s},${cy - s}`} fill={fill} stroke={stroke} strokeWidth={strokeWidth} filter={filter} />; }
    case 'triangleUp': { const s = center.size / 2; return <polygon points={`${cx},${cy - s} ${cx - s},${cy + s} ${cx + s},${cy + s}`} fill={fill} stroke={stroke} strokeWidth={strokeWidth} filter={filter} />; }
    case 'triangleLeft': { const s = center.size / 2; return <polygon points={`${cx - s},${cy} ${cx + s},${cy - s} ${cx + s},${cy + s}`} fill={fill} stroke={stroke} strokeWidth={strokeWidth} filter={filter} />; }
    case 'triangleRight': { const s = center.size / 2; return <polygon points={`${cx + s},${cy} ${cx - s},${cy - s} ${cx - s},${cy + s}`} fill={fill} stroke={stroke} strokeWidth={strokeWidth} filter={filter} />; }
    case 'square': return <rect x={cx - center.w / 2} y={cy - center.h / 2} width={center.w} height={center.h} fill={fill} stroke={stroke} strokeWidth={strokeWidth} filter={filter} />;
    case 'diamond': { const s = center.size; return <polygon points={`${cx},${cy - s} ${cx + s},${cy} ${cx},${cy + s} ${cx - s},${cy}`} fill={fill} stroke={stroke} strokeWidth={strokeWidth} filter={filter} />; }
  }
}

    </div>
  );
  return (
    <div className="bg-black/40 border border-amber-500/40 rounded p-5">
      <div className="text-amber-300/80 text-xs font-display tracking-widest mb-3">⊹ INCARNATION CROSS · 4-GATE SOUL MISSION ⊹</div>
      <div className="grid grid-cols-2 gap-3">
        <Card label="PERSONALITY SUN" gate={ic.personalitySun} />
        <Card label="PERSONALITY EARTH" gate={ic.personalityEarth} />
        <Card label="DESIGN SUN" gate={ic.designSun} />
        <Card label="DESIGN EARTH" gate={ic.designEarth} />
      </div>
    </div>
  );
}

function Section({ number, title, children }) {
  return (
    <div className="mb-12">
      <div className="flex items-center mb-5"><div className="text-amber-400 text-xs tracking-[0.4em] font-display mr-3">{number}</div><div className="h-px flex-1 bg-amber-700/40"></div></div>
      <h2 className="text-3xl font-serif text-amber-300 mb-4 tracking-wide italic">{title}</h2>
      <div className="text-stone-200 font-serif leading-relaxed text-base space-y-3">{children}</div>
    </div>
  );
}

function AstroOduHumanDesign() {
  const [view, setView] = useState('form');
  const [chart, setChart] = useState(null);
  const [r1, setR1] = useState(null), [r2, setR2] = useState(null), [r3, setR3] = useState(null), [r4, setR4] = useState(null);
  const [error, setError] = useState(null);
  const [stage, setStage] = useState('');
  const [prefill, setPrefill] = useState(null);

  useEffect(() => {
    const u = (localStorage.getItem('ntas98_user') || '').toLowerCase();
    if (!u) return;
    try {
      const raw = localStorage.getItem('ntas98_profile_' + u);
      if (raw) {
        const p = JSON.parse(raw);
        setPrefill({ full_name: p.full_name, dob: p.dob, birth_time: p.birth_time, birth_location: p.birth_location });
      } else {
        const ud = localStorage.getItem('ntas98_userdata_' + u);
        if (ud) {
          const d = JSON.parse(ud);
          if (d.full_name || d.name) setPrefill({ full_name: d.full_name || d.name });
        }
      }
    } catch(e) {}
    (async () => {
      try {
        const res = await fetch('/.netlify/functions/get-profile', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userEmail: u })
        });
        const data = await res.json();
        if (data && data.success && data.profile) {
          const p = data.profile;
          setPrefill({
            full_name: p.full_name || null,
            dob: p.dob || null,
            birth_time: p.birth_time || null,
            birth_location: p.birth_location || null
          });
          try { localStorage.setItem('ntas98_profile_' + u, JSON.stringify(p)); } catch(e) {}
        }
      } catch(e) {}
    })();
  }, []);

  const handleSubmit = async (birthData) => {
    setError(null); setView('calculating'); setStage('Computing Personality and Design');
    setR1(null); setR2(null); setR3(null); setR4(null);
    try {
      const calculatedChart = calculateChart(birthData);
      setChart(calculatedChart);
      await new Promise(r => setTimeout(r, 800));
      setView('reading');
      setStage('Channeling — I of IV: Type & Authority'); setR1(await callBackend(calculatedChart, 1));
      setStage('Channeling — II of IV: Profile & Centers'); setR2(await callBackend(calculatedChart, 2));
      setStage('Channeling — III of IV: Channels & Gates'); setR3(await callBackend(calculatedChart, 3));
      setStage('Channeling — IV of IV: Cross & Sankofa'); setR4(await callBackend(calculatedChart, 4));
      setStage('');
    } catch (err) {
      console.error(err);
      setError(err.message || 'The channel has been disturbed. Try again.');
      setStage('');
    }
  };

  const reset = () => { setView('form'); setChart(null); setR1(null); setR2(null); setR3(null); setR4(null); setError(null); };

  return (
    <div className="min-h-screen bg-gradient-to-b from-black via-stone-950 to-black text-stone-100">
      {view === 'form' && <HDForm onSubmit={handleSubmit} prefill={prefill} />}
      {view === 'calculating' && <LoadingRitual stage={stage} />}
      {view === 'reading' && chart && (
        <div className="max-w-3xl mx-auto px-6 py-10">
          <div className="text-center mb-10 fade-up">
            <div className="text-amber-400 text-xs tracking-[0.5em] mb-3 font-display">NTAS98 · ASTRO-ODU HUMAN DESIGN</div>
            <div className="h-px w-24 bg-amber-400 mx-auto opacity-60 mb-6"></div>
            <h1 className="text-4xl font-serif text-stone-100 italic">Your Body's Sacred Design</h1>
          </div>
          <div className="mb-10 fade-up"><BodyGraph chart={chart} /></div>
          <div className="mb-6"><CoreFacts chart={chart} /></div>
          <div className="grid md:grid-cols-2 gap-4 mb-6"><CentersPanel chart={chart} /><ActiveGatesPanel chart={chart} /></div>
          <div className="mb-10"><IncarnationCrossPanel chart={chart} /></div>
          {stage && (
            <div className="text-center py-6 mb-6">
              <div className="inline-flex items-center gap-3">
                <div className="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div>
                <span className="text-amber-300/80 italic font-serif text-sm tracking-widest">{stage}</span>
              </div>
            </div>
          )}
          {error && (
            <div className="bg-red-900/20 border border-red-800/40 rounded p-4 text-red-300 mb-6">
              {error}<button onClick={reset} className="block mt-3 text-amber-300 underline">Begin again</button>
            </div>
          )}
          {r1 && (
            <div className="fade-up">
              <Section number="I" title="The Body Speaks"><p>{r1.body_speaks}</p></Section>
              <Section number="II" title={`Type & Strategy — ${chart.type}`}><p>{r1.type_and_strategy}</p></Section>
              <Section number="III" title={`Authority — ${chart.authority}`}><p>{r1.authority}</p></Section>
            </div>
          )}
          {r2 && (
            <div className="fade-up">
              <Section number="IV" title={`Profile — ${chart.profile}`}><p>{r2.profile}</p></Section>
              <Section number="V" title="The Defined Centers — Calibrated Orisha"><p>{r2.defined_centers}</p></Section>
              <Section number="VI" title="The Open Centers — Wisdom Portals"><p>{r2.open_centers}</p></Section>
            </div>
          )}
          {r3 && (
            <div className="fade-up">
              <Section number="VII" title="The Channels — Active Currents">
                <p>{r3.channels}</p>
                {chart.definedChannels.length > 0 && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-5 text-sm">
                    {chart.definedChannels.map((ch, i) => (
                      <div key={i} className="border border-amber-700/30 rounded px-3 py-2 bg-black/30">
                        <div className="text-amber-400 font-serif">{ch.name}</div>
                        <div className="text-stone-300 text-xs italic">{ch.centers[0]} ↔ {ch.centers[1]}</div>
                        <div className="text-amber-200/40 text-[10px] font-display tracking-widest">HD {ch.gates[0]}-{ch.gates[1]}</div>
                      </div>
                    ))}
                  </div>
                )}
              </Section>
              <Section number="VIII" title="The Active Gates — Odu-Element"><p>{r3.active_gates}</p></Section>
              <Section number="IX" title={`Definition — ${chart.definition}`}><p>{r3.definition}</p></Section>
            </div>
          )}
          {r4 && (
            <div className="fade-up">
              <Section number="X" title="The Incarnation Cross — Soul's Mission"><p>{r4.incarnation_cross}</p></Section>
              <Section number="XI" title="Living Your Design"><p>{r4.living_your_design}</p></Section>
              <Section number="XII" title="Sankofa — Reach Back"><p>{r4.sankofa}</p></Section>
              <div className="text-center mt-16 mb-8 no-print">
                <div className="h-px w-24 bg-amber-400/60 mx-auto mb-6"></div>
                <button onClick={() => window.print()} className="mr-4 bg-amber-700/30 border border-amber-500/60 text-amber-200 font-display tracking-widest px-6 py-3 rounded hover:bg-amber-700/50 transition">SAVE AS PDF</button>
                <button onClick={reset} className="bg-transparent border border-amber-500/60 text-amber-200 font-display tracking-widest px-6 py-3 rounded hover:bg-amber-700/30 transition">CAST ANOTHER</button>
              </div>
              <div className="text-center text-amber-700/50 font-serif italic text-sm pb-12">⊹  NTAS98 · Nature · Trap · Soul · 1998  ⊹</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AstroOduHumanDesign />);
</script>
</body>
</html>
