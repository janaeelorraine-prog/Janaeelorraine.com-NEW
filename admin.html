<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — NTAS98</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080d; --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.25);
  --gold-glow: rgba(201,168,76,0.08); --white: #f0eee8;
  --muted: rgba(240,238,232,0.5); --border: rgba(201,168,76,0.12);
  --card: rgba(255,255,255,0.025);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--white); font-family: 'Cormorant Garamond', serif; min-height:100vh; }

nav { position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 40px; background:rgba(6,8,13,0.96);
  border-bottom:1px solid var(--border); backdrop-filter:blur(12px); }
.logo { font-family:'Cinzel Decorative',serif; font-size:16px; font-weight:700;
  color:var(--gold); text-decoration:none; letter-spacing:4px; }
nav .admin-tag { font-size:10px; letter-spacing:4px; color:var(--gold);
  border:1px solid var(--gold-dim); padding:5px 14px; text-transform:uppercase; }

.wrap { max-width:1200px; margin:0 auto; padding:110px 40px 80px; }

/* login gate */
.gate { max-width:440px; margin:60px auto; border:1px solid var(--border);
  background:var(--card); padding:40px 36px; }
.gate h1 { font-family:'Cinzel Decorative',serif; font-size:24px; letter-spacing:2px;
  text-align:center; margin-bottom:30px; }
.eyebrow { font-size:10px; letter-spacing:5px; text-transform:uppercase;
  color:var(--gold); opacity:0.75; text-align:center; margin-bottom:8px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color:var(--gold); margin-bottom:6px; opacity:0.8; }
.field input { width:100%; padding:12px 14px; background:rgba(240,238,232,0.03);
  border:1px solid var(--border); color:var(--white);
  font-family:'Cormorant Garamond',serif; font-size:15px; outline:none; }
.field input:focus { border-color:rgba(201,168,76,0.5); }
.btn { width:100%; padding:14px; background:transparent;
  border:1px solid var(--gold); color:var(--gold);
  font-family:'Cinzel Decorative',serif; font-size:11px; letter-spacing:4px;
  text-transform:uppercase; cursor:pointer; transition:all 0.3s; margin-top:10px; }
.btn:hover { background:var(--gold-glow); }
.btn:disabled { opacity:0.4; cursor:not-allowed; }
.msg { padding:12px 14px; margin-bottom:16px; font-size:14px; line-height:1.5; display:none; }
.msg.show { display:block; }
.msg.error { border:1px solid rgba(255,80,80,0.3); background:rgba(255,80,80,0.04); color:#ff9090; }

/* dashboard */
.page-head { display:flex; align-items:baseline; justify-content:space-between;
  padding-bottom:28px; border-bottom:1px solid var(--border); margin-bottom:40px; }
.page-title { font-family:'Cinzel Decorative',serif; font-size:32px; letter-spacing:2px; }
.page-sub { font-size:13px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
.logout { font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); background:none; border:none; cursor:pointer;
  font-family:'Cormorant Garamond',serif; }
.logout:hover { color:var(--white); }

.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:40px; }
.stat { border:1px solid var(--border); padding:24px; background:var(--card); }
.stat-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:8px; }
.stat-val { font-family:'Cinzel Decorative',serif; font-size:36px; color:var(--white); }

.section-head { display:flex; align-items:center; justify-content:space-between;
  margin:50px 0 16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.section-title { font-family:'Cinzel Decorative',serif; font-size:18px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); }
.section-count { font-size:12px; color:var(--muted); letter-spacing:1px; }

table { width:100%; border-collapse:collapse; }
thead th { text-align:left; font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color:var(--gold); opacity:0.7; padding:14px 12px; border-bottom:1px solid var(--border); font-weight:400; }
tbody td { padding:16px 12px; border-bottom:1px solid rgba(201,168,76,0.06); font-size:15px; }
tbody tr { transition:background 0.2s; }
tbody tr:hover { background:rgba(201,168,76,0.03); }
tbody tr.clickable { cursor:pointer; }

.pill { display:inline-block; font-size:10px; letter-spacing:2px; text-transform:uppercase;
  padding:3px 10px; border-radius:20px; border:1px solid; }
.pill-root  { color:var(--gold); border-color:var(--gold-dim); background:rgba(201,168,76,0.08); }
.pill-seed  { color:#8ec3ff; border-color:rgba(74,158,255,0.3); background:rgba(74,158,255,0.06); }
.pill-none  { color:var(--muted); border-color:var(--border); }
.pill-admin { color:#d09aff; border-color:rgba(170,108,255,0.3); background:rgba(170,108,255,0.05); margin-left:6px; }
.pill-course { color:#9affd0; border-color:rgba(76,201,168,0.3); background:rgba(76,201,168,0.05); margin-right:4px; }

.empty { text-align:center; padding:60px 20px; color:var(--muted); font-style:italic; }

/* detail drawer */
.drawer { position:fixed; inset:0; background:rgba(6,8,13,0.86); backdrop-filter:blur(8px);
  z-index:200; display:none; align-items:stretch; justify-content:flex-end; }
.drawer.show { display:flex; }
.drawer-panel { width:100%; max-width:720px; height:100vh; overflow-y:auto;
  background:var(--bg); border-left:1px solid var(--border); padding:40px; }
.drawer-head { display:flex; align-items:center; justify-content:space-between;
  padding-bottom:20px; border-bottom:1px solid var(--border); margin-bottom:28px; }
.drawer-title { font-family:'Cinzel Decorative',serif; font-size:22px; letter-spacing:2px; }
.drawer-close { background:none; border:1px solid var(--border); color:var(--white);
  padding:6px 14px; cursor:pointer; font-size:11px; letter-spacing:2px;
  text-transform:uppercase; font-family:'Cormorant Garamond',serif; }
.drawer-close:hover { border-color:var(--gold-dim); }

.meta-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px 24px; margin-bottom:28px; }
.meta { }
.meta-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); opacity:0.6; margin-bottom:4px; }
.meta-val { font-size:15px; color:var(--white); }
.meta-val.muted { color:var(--muted); }

.bp-section { border:1px solid var(--border); background:var(--card); padding:22px 24px; margin-bottom:14px; }
.bp-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:6px; }
.bp-title { font-family:'Cinzel Decorative',serif; font-size:17px; color:var(--white); margin-bottom:14px; }
.bp-body { font-size:15px; line-height:1.8; color:rgba(240,238,232,0.82); }
.bp-body p { margin-bottom:10px; }

@media (max-width:800px) {
  .wrap { padding:90px 20px 60px; }
  .stats { grid-template-columns:repeat(2,1fr); }
  nav { padding:14px 20px; }
  .drawer-panel { padding:28px 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">NTAS98</a>
  <span class="admin-tag">Admin</span>
</nav>

<div class="wrap">

  <!-- LOGIN GATE -->
  <section class="gate" id="gate">
    <div class="eyebrow">Restricted</div>
    <h1>Admin Access</h1>
    <div class="msg error" id="gate-msg"></div>
    <div class="field">
      <label>Admin Email</label>
      <input type="email" id="a-email" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="a-password" autocomplete="current-password"/>
    </div>
    <button class="btn" onclick="doAdminLogin()">Enter</button>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboard" style="display:none">
    <div class="page-head">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-sub" id="admin-sub"></div>
      </div>
      <button class="logout" onclick="doAdminLogout()">Sign out</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">Total Members</div><div class="stat-val" id="s-members">—</div></div>
      <div class="stat"><div class="stat-label">Root Tier</div><div class="stat-val" id="s-root">—</div></div>
      <div class="stat"><div class="stat-label">Seed Tier</div><div class="stat-val" id="s-seed">—</div></div>
      <div class="stat"><div class="stat-label">Blueprints</div><div class="stat-val" id="s-profiles">—</div></div>
      <div class="stat"><div class="stat-label">Trinity Readings</div><div class="stat-val" id="s-readings">—</div></div>
    </div>

    <div class="section-head">
      <div class="section-title">Members</div>
      <div class="section-count" id="members-count"></div>
    </div>
    <div id="members-wrap"></div>

    <div class="section-head">
      <div class="section-title">Access Codes</div>
      <div class="section-count" id="codes-count"></div>
    </div>
    <div id="codes-wrap"></div>

  </section>

</div>

<!-- DETAIL DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-panel">
    <div class="drawer-head">
      <div>
        <div class="drawer-title" id="d-name">—</div>
        <div class="page-sub" id="d-email"></div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">Close</button>
    </div>
    <div id="d-body"></div>
  </div>
</div>

<script>
let ADMIN = null;       // { email, password } — held in-memory only
let ADMIN_DATA = null;  // { users, profiles, access_codes }

function showGateError(msg) {
  const m = document.getElementById('gate-msg');
  m.textContent = msg; m.classList.add('show');
}
function hideGateError() { document.getElementById('gate-msg').classList.remove('show'); }

async function doAdminLogin() {
  hideGateError();
  const email = document.getElementById('a-email').value.trim().toLowerCase();
  const password = document.getElementById('a-password').value;
  if (!email || !password) return showGateError('Email and password required.');

  try {
    const res = await fetch('/.netlify/functions/admin-data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminEmail: email, adminPassword: password })
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Unauthorized');

    ADMIN = { email, password };
    ADMIN_DATA = data;

    // Keep creds for the session only — NOT persisted across tabs
    sessionStorage.setItem('ntas98_admin', JSON.stringify(ADMIN));

    renderDashboard();
  } catch (e) {
    showGateError(e.message || 'Unauthorized.');
  }
}

function doAdminLogout() {
  sessionStorage.removeItem('ntas98_admin');
  ADMIN = null; ADMIN_DATA = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('gate').style.display = 'block';
}

function renderDashboard() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('admin-sub').textContent = 'Signed in as ' + ADMIN.email;

  const { users, profiles, access_codes } = ADMIN_DATA;
  const profileEmails = new Set((profiles || []).map(p => p.user_email));

  // Stats
  document.getElementById('s-members').textContent = users.length;
  document.getElementById('s-root').textContent = users.filter(u => u.portal_tier === 'root').length;
  document.getElementById('s-seed').textContent = users.filter(u => u.portal_tier === 'seed').length;
  document.getElementById('s-profiles').textContent = (profiles || []).length;
  document.getElementById('s-readings').textContent = (ADMIN_DATA.trinity_readings || []).length;

  // Members table
  document.getElementById('members-count').textContent = users.length + ' total';
  const mWrap = document.getElementById('members-wrap');
  if (!users.length) {
    mWrap.innerHTML = '<div class="empty">No members yet.</div>';
  } else {
    mWrap.innerHTML = `
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Tier</th><th>Courses</th><th>Blueprint</th><th>Joined</th>
        </tr></thead>
        <tbody>
          ${users.map(u => `
            <tr class="clickable" onclick="openMember('${u.email}')">
              <td>${escapeHtml(u.name || '—')}${u.is_admin ? '<span class="pill pill-admin">Admin</span>' : ''}</td>
              <td style="color:var(--muted)">${escapeHtml(u.email)}</td>
              <td>${tierPill(u.portal_tier)}</td>
              <td>${coursesPills(u.courses)}</td>
              <td>${profileEmails.has(u.email) ? '<span class="pill pill-root">✓ Generated</span>' : '<span class="pill pill-none">Pending</span>'}</td>
              <td style="color:var(--muted); font-size:13px">${formatDate(u.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // Access codes table
  const codes = access_codes || [];
  document.getElementById('codes-count').textContent = codes.length + ' active';
  const cWrap = document.getElementById('codes-wrap');
  if (!codes.length) {
    cWrap.innerHTML = '<div class="empty">No codes in DB — falling back to hardcoded defaults in the function.</div>';
  } else {
    cWrap.innerHTML = `
      <table>
        <thead><tr>
          <th>Code</th><th>Type</th><th>Tier / Course</th><th>Uses</th><th>Active</th><th>Note</th>
        </tr></thead>
        <tbody>
          ${codes.map(c => `
            <tr>
              <td style="font-family:'Cinzel Decorative',serif;color:var(--gold);letter-spacing:2px">${escapeHtml(c.code)}</td>
              <td style="color:var(--muted)">${escapeHtml(c.code_type)}</td>
              <td>${c.code_type === 'portal' ? tierPill(c.tier) : `<span class="pill pill-course">${escapeHtml(c.course_id || '—')}</span>`}</td>
              <td>${c.uses || 0}${c.max_uses ? ' / ' + c.max_uses : ''}</td>
              <td>${c.active ? '<span class="pill pill-root">Active</span>' : '<span class="pill pill-none">Off</span>'}</td>
              <td style="color:var(--muted); font-size:13px">${escapeHtml(c.note || '')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }
}

async function openMember(email) {
  if (!ADMIN) return;
  const drawer = document.getElementById('drawer');
  drawer.classList.add('show');
  document.getElementById('d-name').textContent = 'Loading…';
  document.getElementById('d-email').textContent = email;
  document.getElementById('d-body').innerHTML = '';

  try {
    const res = await fetch('/.netlify/functions/admin-member-detail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        adminEmail: ADMIN.email,
        adminPassword: ADMIN.password,
        memberEmail: email
      })
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Could not load');
    renderMember(data);
  } catch (e) {
    document.getElementById('d-body').innerHTML =
      `<div class="msg error show">${escapeHtml(e.message)}</div>`;
    document.getElementById('d-name').textContent = '—';
  }
}

function renderMember({ user, profile, course_progress, journal_entries }) {
  document.getElementById('d-name').textContent = user.name || '—';
  document.getElementById('d-email').textContent = user.email;

  const bp = profile && profile.generated_output;
  const body = document.getElementById('d-body');

  let html = `
    <div class="meta-grid">
      <div class="meta"><div class="meta-label">Tier</div><div class="meta-val">${user.portal_tier || 'None'}</div></div>
      <div class="meta"><div class="meta-label">Courses</div><div class="meta-val">${(user.courses||[]).join(', ') || '—'}</div></div>
      <div class="meta"><div class="meta-label">Joined</div><div class="meta-val">${formatDate(user.created_at)}</div></div>
      <div class="meta"><div class="meta-label">Admin</div><div class="meta-val">${user.is_admin ? 'Yes' : 'No'}</div></div>
      ${profile ? `
        <div class="meta"><div class="meta-label">Date of Birth</div><div class="meta-val">${profile.dob || '—'}</div></div>
        <div class="meta"><div class="meta-label">Birth Location</div><div class="meta-val">${escapeHtml(profile.birth_location || '—')}</div></div>
        <div class="meta"><div class="meta-label">Blood Type</div><div class="meta-val">${escapeHtml(profile.blood_type || '—')}</div></div>
        <div class="meta"><div class="meta-label">Preferred Name</div><div class="meta-val">${escapeHtml(profile.preferred_name || '—')}</div></div>
      ` : ''}
    </div>
  `;

  // ─── COURSE PROGRESS ───────────────────────────────────
  html += renderCourseProgress(course_progress || []);

  // ─── JOURNAL ENTRIES ───────────────────────────────────
  html += renderJournalEntries(journal_entries || []);

  if (!bp) {
    html += `<div class="empty">This member has not generated their blueprint yet.</div>`;
  } else {
    html += renderBpSection('Identity', '', bp.identity_overview);
    if (bp.astrology)         html += renderBpSection('Astrology · Sun Sign', (bp.astrology.sun_sign || '') + ' ' + (bp.astrology.symbol || ''), bp.astrology.reading);
    if (bp.numerology)        html += renderBpSection('Numerology · Life Path ' + (bp.numerology.life_path || ''), bp.numerology.title, bp.numerology.reading);
    if (bp.blood_type)        html += renderBpSection('Blood Type', bp.blood_type.type, bp.blood_type.reading);
    if (bp.human_design)      html += renderBpSection('Human Design', bp.human_design.type, bp.human_design.reading);
    if (bp.astrocartography)  html += renderBpSection('Astrocartography', '', bp.astrocartography.reading);
    if (bp.archetype_overlay) html += renderBpSection('Archetype Overlay', bp.archetype_overlay.title, bp.archetype_overlay.reading);
  }

  body.innerHTML = html;
}

function renderCourseProgress(progress) {
  if (!progress.length) {
    return `<div class="bp-section">
      <div class="bp-label">Course Journey</div>
      <div class="empty" style="margin-top:8px">This member has not begun any course lessons yet.</div>
    </div>`;
  }

  // group by course
  const byCourse = {};
  progress.forEach(p => {
    byCourse[p.course_id] = byCourse[p.course_id] || [];
    byCourse[p.course_id].push(p);
  });

  const COURSE_NAMES = {
    foundations: 'Foundations of Africana Spiritual Traditions'
  };

  let out = '';
  Object.keys(byCourse).forEach(cid => {
    const rows = byCourse[cid].sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
    const completed = rows.filter(r => r.completed).length;
    const total = rows.length;
    const lastAt = rows[0] && rows[0].updated_at;

    // group lessons by module
    const byMod = {};
    rows.forEach(r => {
      byMod[r.module_id] = byMod[r.module_id] || [];
      byMod[r.module_id].push(r);
    });

    out += `<div class="bp-section">
      <div class="bp-label">Course Journey · ${escapeHtml(COURSE_NAMES[cid] || cid)}</div>
      <div class="bp-title">${completed} of ${total} lessons attempted · last activity ${formatDate(lastAt)}</div>
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px">
        ${Object.keys(byMod).map(mid => {
          const lessons = byMod[mid];
          const done = lessons.filter(l => l.completed).length;
          return `<div style="background:rgba(212,175,60,0.04);border:1px solid rgba(212,175,60,0.18);padding:10px 14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <div style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold,#d4af3c);text-transform:uppercase">${escapeHtml(mid)}</div>
              <div style="font-size:11px;color:var(--muted,#888)">${done}/${lessons.length} complete</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px">
              ${lessons.map(l => `
                <div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0">
                  <span style="color:${l.completed ? '#7ce0a0' : 'var(--muted,#888)'}">${l.completed ? '✓' : '○'} ${escapeHtml(l.lesson_id)}</span>
                  <span style="color:var(--muted,#888);font-size:11px">${formatDate(l.updated_at)}</span>
                </div>
              `).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  return out;
}

function renderJournalEntries(entries) {
  if (!entries.length) {
    return `<div class="bp-section">
      <div class="bp-label">Reflection Journal</div>
      <div class="empty" style="margin-top:8px">No journal entries yet.</div>
    </div>`;
  }
  return `<div class="bp-section">
    <div class="bp-label">Reflection Journal · ${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}</div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:14px">
      ${entries.map(e => `
        <div style="background:rgba(255,255,255,0.02);border-left:2px solid var(--gold,#d4af3c);padding:12px 16px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
            <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--gold,#d4af3c);text-transform:uppercase">${escapeHtml(e.module_id)} · ${escapeHtml(e.lesson_id)}</div>
            <div style="font-size:11px;color:var(--muted,#888)">${formatDate(e.updated_at)}</div>
          </div>
          <div style="font-family:'Cormorant Garamond','Georgia',serif;font-size:15px;line-height:1.6;color:#e8dcbc;white-space:pre-wrap">${escapeHtml(e.entry || '')}</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function renderBpSection(label, title, text) {
  if (!text) return '';
  const paras = String(text).split('\n').map(p => p.trim()).filter(Boolean)
    .map(p => `<p>${escapeHtml(p)}</p>`).join('');
  return `
    <div class="bp-section">
      <div class="bp-label">${escapeHtml(label)}</div>
      ${title ? `<div class="bp-title">${escapeHtml(title)}</div>` : ''}
      <div class="bp-body">${paras}</div>
    </div>
  `;
}

function closeDrawer() { document.getElementById('drawer').classList.remove('show'); }
document.getElementById('drawer').addEventListener('click', (e) => {
  if (e.target.id === 'drawer') closeDrawer();
});

function tierPill(tier) {
  if (tier === 'root') return '<span class="pill pill-root">Root</span>';
  if (tier === 'seed') return '<span class="pill pill-seed">Seed</span>';
  return '<span class="pill pill-none">—</span>';
}
function coursesPills(arr) {
  if (!arr || !arr.length) return '<span style="color:var(--muted)">—</span>';
  return arr.map(c => `<span class="pill pill-course">${escapeHtml(c)}</span>`).join('');
}
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// Restore session
(function restore() {
  const saved = sessionStorage.getItem('ntas98_admin');
  if (!saved) return;
  try {
    const a = JSON.parse(saved);
    if (a.email && a.password) {
      document.getElementById('a-email').value = a.email;
      document.getElementById('a-password').value = a.password;
      doAdminLogin();
    }
  } catch {}
})();
</script>
