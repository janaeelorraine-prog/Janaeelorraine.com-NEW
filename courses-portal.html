const COURSES = {

        modules: [

            { title: 'Astrology as a Tool for Liberation', lessons: [{title:'The Two Cradle Theory',type:'Video'},{title:'Relocation Theory',type:'Reading'},{title:'Reconciling the Maafa Through the Stars',type:'Video'},{title:'Final Integration Practice',type:'Exercise'}] }

            { title: 'The Ifá Corpus and Esoteric Wisdom', lessons: [{title:'Orunmila and the Ifá Odu',type:'Video'},{title:'The 16 Major Odu and Their Ethical Codes',type:'Reading'},{title:'Proverbial Wisdom and Moral Teachings',type:'Video'},{title:'Module 2 Reflection',type:'Exercise'}] },

            { title: 'Ritual Internalization and Personal Growth', lessons: [{title:'Mapping Orisha to Body and Consciousness',type:'Video'},{title:'Spiritual Baths and Prayers',type:'Reading'},{title:'Offerings and Elevation Practice',type:'Live Session'},{title:'Final Integration and Designation Ceremony',type:'Exercise'}] }

let progressCache = {};

async function loadProgress() {
    const { data } = await sb.from('course_progress').select('*').eq('user_email', user.email);
    if (data) {
        data.forEach(row => {
            if (!progressCache[row.course_id]) progressCache[row.course_id] = {};
            if (!progressCache[row.course_id][row.module_idx]) progressCache[row.course_id][row.module_idx] = {};
            progressCache[row.course_id][row.module_idx][row.lesson_idx] = row.completed;
        });
    }
    renderCourses();
}

async function toggleLesson(courseId, moduleIdx, lessonIdx) {
    const current = progressCache[courseId]?.[moduleIdx]?.[lessonIdx] || false;
    const newVal = !current;
    if (!progressCache[courseId]) progressCache[courseId] = {};
    if (!progressCache[courseId][moduleIdx]) progressCache[courseId][moduleIdx] = {};
    progressCache[courseId][moduleIdx][lessonIdx] = newVal;

    await sb.from('course_progress').upsert({
        user_email: user.email,
        course_id: courseId,
        module_idx: moduleIdx,
        lesson_idx: lessonIdx,
        completed: newVal,
        updated_at: new Date().toISOString()
    }, { onConflict: 'user_email,course_id,module_idx,lesson_idx' });

    renderCourses();
}

function getCourseProgress(courseId) {
    const course = COURSES[courseId];
    let total = 0, done = 0;
    course.modules.forEach((mod, mi) => {
        mod.lessons.forEach((_, li) => {
            total++;
            if (progressCache[courseId]?.[mi]?.[li]) done++;
        });
    });
    return { total, done, pct: total > 0 ? Math.round((done/total)*100) : 0 };
}

function renderCourses() {
    const container = document.getElementById('courses-container');
    const enrolledCourses = user.courses || [];

    if (enrolledCourses.length === 0) {
        container.innerHTML = `<div class="no-courses"><div class="no-courses-icon">📚</div><div class="no-courses-title">No Courses Yet</div><p class="no-courses-text">You haven't enrolled in any courses. Purchase a course and use your access code to get started.</p><a href="courses.html" class="enroll-link">Browse Courses</a></div>`;
        return;
    }

    let html = '';
    enrolledCourses.forEach(courseId => {
        const course = COURSES[courseId];
        if (!course) return;
        const { total, done, pct } = getCourseProgress(courseId);
        const isComplete = pct === 100;

        html += `<div class="course-block">
            <div class="course-block-header" onclick="toggleCourse('${courseId}')">
                <div><div class="course-num">Course ${course.num}</div><div class="course-name-display">${course.title}</div><div class="course-designation">Designation: ${course.designation}</div></div>
                <div class="course-header-right">
                    <div class="course-progress-label">Progress</div>
                    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
                    <div class="progress-pct">${done}/${total} · ${pct}%</div>
                    <div class="course-toggle" id="toggle-${courseId}">▼</div>
                </div>
            </div>
            <div class="modules-wrap" id="modules-${courseId}">`;

        course.modules.forEach((mod, mi) => {
            const modDone = mod.lessons.filter((_, li) => progressCache[courseId]?.[mi]?.[li]).length;
            const modComplete = modDone === mod.lessons.length;
            html += `<div class="module-block">
                <div class="module-header" onclick="toggleModule('${courseId}',${mi})">
                    <div class="module-header-left">
                        <div class="module-check ${modComplete?'complete':''}">${modComplete?'✦':''}</div>
                        <div><div class="module-num-label">Module ${mi+1}</div><div class="module-title-text">${mod.title}</div></div>
                    </div>
                    <div class="module-toggle" id="mod-toggle-${courseId}-${mi}">▼</div>
                </div>
                <div class="lessons-wrap" id="lessons-${courseId}-${mi}">`;

            mod.lessons.forEach((lesson, li) => {
                const isDone = progressCache[courseId]?.[mi]?.[li];
                html += `<div class="lesson-item">
                    <div class="lesson-check ${isDone?'complete':''}">${isDone?'✓':''}</div>
                    <div class="lesson-title ${isDone?'complete':''}">${lesson.title}</div>
                    <div class="lesson-type">${lesson.type}</div>
                    <button class="mark-btn" onclick="toggleLesson('${courseId}',${mi},${li})">${isDone?'Completed':'Mark Done'}</button>
                </div>`;
            });
            html += `</div></div>`;
        });

        html += `<div class="certificate-wrap ${isComplete?'earned':''}" id="cert-${courseId}">
            <div class="cert-icon">${isComplete?'📜':'🔒'}</div>
            <div class="cert-title">${isComplete?'Designation Earned':'Certificate Locked'}</div>
            <div class="cert-text">${isComplete?'Congratulations. You have completed all four modules and earned your designation.':`Complete all ${total} lessons to unlock your certificate.`}</div>
            ${isComplete?`<div class="cert-designation">✦ &nbsp; ${course.designation} &nbsp; ✦</div>`:''}
        </div>`;

        html += `</div></div>`;
    });

    if (user.portal_tier) {
        html += `<div style="text-align:center;margin-top:40px;padding:28px;border:1px solid rgba(201,168,76,0.15);background:rgba(201,168,76,0.03);">
            <div style="font-family:'Cinzel Decorative',serif;font-size:0.75rem;letter-spacing:3px;color:var(--gold);margin-bottom:10px;text-transform:uppercase;">✦ Root Portal Access</div>
            <p style="font-style:italic;font-size:0.88rem;color:rgba(240,238,232,0.4);margin-bottom:16px;">You also have access to your personalized Root Portal profile.</p>
            <a href="portal-member.html" style="display:inline-block;padding:10px 28px;border:1px solid var(--gold);color:var(--gold);text-decoration:none;font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;">Go to My Portal</a>
        </div>`;
    }

    container.innerHTML = html;
}

function toggleCourse(courseId) {
    const wrap = document.getElementById(`modules-${courseId}`);
    const toggle = document.getElementById(`toggle-${courseId}`);
    const isOpen = wrap.classList.contains('open');
    wrap.classList.toggle('open');
    toggle.textContent = isOpen ? '▼' : '▲';
}

function toggleModule(courseId, mi) {
    const wrap = document.getElementById(`lessons-${courseId}-${mi}`);
    const toggle = document.getElementById(`mod-toggle-${courseId}-${mi}`);
    wrap.classList.toggle('open');
    toggle.classList.toggle('open');
}

loadProgress();

const container = document.getElementById('particles');
const colors = ['rgba(74,158,255,0.7)','rgba(107,63,160,0.6)','rgba(201,168,76,0.5)','rgba(139,92,200,0.6)'];
for(let i=0;i<40;i++){const p=document.createElement('div');p.className='particle';const size=Math.random()*4+1;p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};box-shadow:0 0 ${size*4}px ${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*12}s;`;container.appendChild(p);}
</script>
</body>
</html>
